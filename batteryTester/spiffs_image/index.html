<!doctype html>
<html>

<head>
	<meta http-equiv="content-type" content="text/html; charset=UTF-8">
	<title>BatterijTester</title>
	<link rel="stylesheet" type="text/css" href="styles.css">
	<script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
	<script src="js/chart.js" type="text/javascript" charset="utf-8"></script>
	<script src="js/common.js" type="text/javascript" charset="utf-8"></script>
	<script type="text/javascript">
		google.charts.load('current', {
			'packages': ['corechart']
		});
		google.charts.setOnLoadCallback(initChart);
		google.load("visualization", "1", {packages: ["corechart"]});
	</script>
</head>

<body>
	<div id="chart" style="width: 100%; height: 800px"></div>
	<br>

	<table class="styled-table">
		<tbody>
			<tr>
				<th style="text-align:left"> Positie:</thtyle="width: 100%;>
				<th>1</th>
				<th>2</th>
				<th>3</th>
				<th>4</th>
			</tr>
			<tr>
				<th style="text-align:left">Grafiek:</th>
				<td><input type="checkbox" id="T1cb" class="save-cb-state" name="T1cb" value="yes"></td>
				<td><input type="checkbox" id="T2cb" class="save-cb-state" name="T2cb" value="yes"></td>
				<td><input type="checkbox" id="T3cb" class="save-cb-state" name="T3cb" value="yes"></td>
				<td><input type="checkbox" id="T4cb" class="save-cb-state" name="T4cb" value="yes"></td>
			</tr>
			<tr>
				<th style="text-align:left">Status:</th>
				<td>
					<div id="s1"></div>
				</td>
				<td>
					<div id="s2"></div>
				</td>
				<td>
					<div id="s3"></div>
				</td>
				<td>
					<div id="s4"></div>
				</td>
			</tr>
			<tr>
				<th style="text-align:left">Gemeten capaciteit (mAh):</th>
				<td>
					<div id="gc1"></div>
				</td>
				<td>
					<div id="gc2"></div>
				</td>
				<td>
					<div id="gc3></div>
				</td>
				<td>
					<div id="gc4></div>
				</td>
			</tr>
			<tr>
				<th style="text-align:left">Spanning (V):</th>
				<td>
					<div id="v1"></div>
				</td>
				<td>
					<div id="v2"></div>
				</td>
				<td>
					<div id="v3"></div>
				</td>
				<td>
					<div id="v4"></div>
				</td>
			</tr>
			<tr>
				<th style="text-align:left">Actuele capaciteit (mAh):</th>
				<td>
					<div id="ac1"></div>
				</td>
				<td>
					<div id="ac2"></div>
				</td>
				<td>
					<div id="ac3"></div>
				</td>
				<td>
					<div id="ac4"></div>
				</td>
			</tr>
		</tbody>
	</table>
	<br>
	<a href="settings.html">Instellingen</a>
</body>

</html>
